<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camentra | Professional Camera Guidance for Small Businesses</title>
    <!-- Camentra favicon; Vite dev/preview serves /favicon.ico as this PNG (see vite.config.ts). -->
    <link rel="icon" type="image/png" href="/camentra-favicon.png?v=6" sizes="any" />
    <link rel="apple-touch-icon" href="/camentra-favicon.png?v=6" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
    <!-- Parent tokens: sync /public/brand-tokens.css from umbrella marketing repo when tokens change -->
    <link rel="stylesheet" href="/brand-tokens.css" />
    <style>
        body {
            font-family: var(--ba-font-sans);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: var(--ba-color-page-bg);
            color: var(--ba-color-text);
            scroll-behavior: smooth;
        }

        .font-serif {
            font-family: var(--ba-font-serif);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--ba-gray-300);
            border-radius: 10px;
            border: 2px solid white;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--ba-gray-400); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "react/": "https://esm.sh/react@^19.2.3/"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
